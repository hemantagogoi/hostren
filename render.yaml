services:
  - type: web
    name: question-paper-generator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: FLASK_ENV
        value: production
    healthCheckPath: /health
