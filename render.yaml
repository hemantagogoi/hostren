services:
  - type: web
    name: question-paper-generator
    runtime: python-3.11
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "true"
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: question-paper-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: question-paper-db
    plan: free
