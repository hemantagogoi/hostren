services:
  # Web Service
  - type: web
    name: question-paper-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: question-paper-db
          property: connectionString
      - key: RENDER
        value: true
      - key: PORT
        value: 10000

  # PostgreSQL Database
  - type: pserv
    name: question-paper-db
    runtime: postgresql
    plan: free
    databases:
      - name: flaskapp
